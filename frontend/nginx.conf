server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: unknown routes return index.html so client-side
    # routing (react-router) works on refresh / deep links.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively (Vite emits content-hashed filenames).
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
